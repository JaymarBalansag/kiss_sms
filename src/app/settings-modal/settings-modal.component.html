<ion-header class="modal-header" translucent="true">
  <ion-toolbar>
    <ion-title>
      <ion-icon name="settings-outline" class="title-icon"></ion-icon>
      Settings
    </ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="close-icon-btn" (click)="dismiss()" aria-label="Close settings">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="settings-modal-content" [fullscreen]="true">
  <div class="modal-shell ion-padding">
    <section class="intro-card">
      <h2>Quick Actions</h2>
      <p>Manage API endpoint and your current session.</p>
    </section>

    <button type="button" class="action-card" (click)="onSetApiUrl()">
      <span class="action-icon api">
        <ion-icon name="link-outline"></ion-icon>
      </span>
      <span class="action-copy">
        <strong>Set API URL</strong>
        <small>Use a custom endpoint or switch back to default.</small>
      </span>
      <ion-icon name="chevron-forward-outline" class="action-arrow"></ion-icon>
    </button>

    <button type="button" class="action-card danger" (click)="onLogout()">
      <span class="action-icon logout">
        <ion-icon name="log-out-outline"></ion-icon>
      </span>
      <span class="action-copy">
        <strong>Logout</strong>
        <small>End your current session on this device.</small>
      </span>
      <ion-icon name="chevron-forward-outline" class="action-arrow"></ion-icon>
    </button>

    <ion-button expand="block" class="close-button" (click)="dismiss()">
      Close
    </ion-button>
  </div>
</ion-content>
